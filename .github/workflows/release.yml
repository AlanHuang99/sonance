name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build, sign, notarize, publish
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve version from tag
        id: ver
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Show toolchain
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build unsigned Release app (Direct channel + Sparkle)
        run: ./scripts/build-release-app.sh "${{ steps.ver.outputs.version }}" "$GITHUB_RUN_NUMBER" Sonance-Direct

      - name: Verify universal binary
        run: lipo -info build/Build/Products/Release/Sonance.app/Contents/MacOS/Sonance

      - name: Import Developer ID certificate
        env:
          P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.MACOS_CERT_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          echo "$P12_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          rm "$CERT_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Codesign with Developer ID
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | awk -F '"' '/Developer ID Application/ {print $2; exit}')
          if [[ -z "$IDENTITY" ]]; then
            echo "No Developer ID Application identity in $KEYCHAIN_PATH"
            security find-identity -v -p codesigning "$KEYCHAIN_PATH"
            exit 1
          fi
          ./scripts/sign-app.sh \
            build/Build/Products/Release/Sonance.app \
            "$IDENTITY" \
            "$KEYCHAIN_PATH" \
            Sonance/Sonance-Direct.entitlements

      - name: Notarize app
        env:
          KEY_BASE64: ${{ secrets.MACOS_NOTARY_API_KEY_P8_BASE64 }}
          KEY_ID: ${{ secrets.MACOS_NOTARY_API_KEY_ID }}
          ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
        run: |
          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          NOTARY_ZIP="$RUNNER_TEMP/Sonance-notarize.zip"
          echo "$KEY_BASE64" | base64 --decode > "$KEY_PATH"
          ditto -c -k --keepParent build/Build/Products/Release/Sonance.app "$NOTARY_ZIP"
          xcrun notarytool submit "$NOTARY_ZIP" \
            --key "$KEY_PATH" \
            --key-id "$KEY_ID" \
            --issuer "$ISSUER_ID" \
            --wait
          rm "$KEY_PATH"

      - name: Staple notarization ticket
        run: |
          xcrun stapler staple build/Build/Products/Release/Sonance.app
          xcrun stapler validate build/Build/Products/Release/Sonance.app
          spctl -a -vv build/Build/Products/Release/Sonance.app

      - name: Create release artifacts
        run: |
          mkdir -p build/release
          ditto -c -k --keepParent \
            build/Build/Products/Release/Sonance.app \
            "build/release/Sonance-${{ steps.ver.outputs.tag }}.zip"
          ./scripts/make-dmg.sh \
            build/Build/Products/Release/Sonance.app \
            "build/release/Sonance-${{ steps.ver.outputs.tag }}.dmg"
          ls -lh build/release

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/build.keychain-db" || true

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NOTES="$RUNNER_TEMP/release-notes.md"
          {
            echo "## Install"
            echo
            echo 'Download `Sonance-${{ steps.ver.outputs.tag }}.dmg`, open it, and drag Sonance.app to Applications.'
            echo
            echo "The app is signed with Apple Developer ID and notarized by Apple, so Gatekeeper should allow a normal launch."
            echo
            echo "Requires macOS 14+."
          } > "$NOTES"

          gh release create "${{ steps.ver.outputs.tag }}" \
            "build/release/Sonance-${{ steps.ver.outputs.tag }}.zip" \
            "build/release/Sonance-${{ steps.ver.outputs.tag }}.dmg" \
            --title "Sonance ${{ steps.ver.outputs.tag }}" \
            --generate-notes \
            --notes-file "$NOTES"

      # --- Sparkle appcast (Direct channel auto-update) ---
      # The appcast steps are gated on the signing secret being present, so a
      # release made before the Sparkle key is configured still succeeds (it just
      # publishes the DMG/zip without refreshing the feed). The `enabled` check
      # reads the secret via env, never interpolating it into a shell command.
      - name: Check for Sparkle signing key
        id: sparkle
        env:
          KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          if [[ -n "$KEY" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::SPARKLE_ED_PRIVATE_KEY not set — skipping appcast update. In-app updates stay on the previous feed."
          fi

      - name: Sign update and refresh appcast
        if: steps.sparkle.outputs.enabled == 'true'
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          # Official Sparkle CLI tools bundle (prebuilt generate_appcast/sign_update).
          SPARKLE_VER=2.9.3
          curl -fsSL -o "$RUNNER_TEMP/sparkle.tar.xz" \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VER}/Sparkle-${SPARKLE_VER}.tar.xz"
          mkdir -p "$RUNNER_TEMP/sparkle"
          tar -xJf "$RUNNER_TEMP/sparkle.tar.xz" -C "$RUNNER_TEMP/sparkle"
          GENERATE_APPCAST="$RUNNER_TEMP/sparkle/bin/generate_appcast"

          # EdDSA private key (the verbatim contents of `generate_keys -x`).
          KEYFILE="$RUNNER_TEMP/sparkle_ed_private.key"
          printf '%s' "$SPARKLE_ED_PRIVATE_KEY" > "$KEYFILE"

          # Work dir: the current appcast (to preserve prior entries) plus the new,
          # notarized + stapled zip. generate_appcast merges and signs in place.
          WORK="$RUNNER_TEMP/appcast"
          mkdir -p "$WORK"
          curl -fsSL "https://alanhuang99.github.io/sonance/appcast.xml" \
            -o "$WORK/appcast.xml" || echo "No existing appcast (first Sparkle release)."
          cp "build/release/Sonance-${{ steps.ver.outputs.tag }}.zip" "$WORK/"

          "$GENERATE_APPCAST" \
            --ed-key-file "$KEYFILE" \
            --download-url-prefix "https://github.com/${GITHUB_REPOSITORY}/releases/download/${{ steps.ver.outputs.tag }}/" \
            --maximum-versions 0 \
            -o "$WORK/appcast.xml" \
            "$WORK"

          rm -f "$KEYFILE"
          echo "----- appcast.xml -----"
          cat "$WORK/appcast.xml"

      - name: Publish appcast to GitHub Pages
        if: steps.sparkle.outputs.enabled == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          WORK="$RUNNER_TEMP/appcast"
          PAGES="$RUNNER_TEMP/pages"
          REMOTE="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          if git clone --depth 1 --branch gh-pages "$REMOTE" "$PAGES" 2>/dev/null; then
            cp "$WORK/appcast.xml" "$PAGES/appcast.xml"
          else
            # First run: gh-pages doesn't exist yet. Create it as an orphan branch.
            git clone --depth 1 "$REMOTE" "$PAGES"
            ( cd "$PAGES" && git checkout --orphan gh-pages && git rm -rf . >/dev/null 2>&1 || true )
            cp "$WORK/appcast.xml" "$PAGES/appcast.xml"
          fi
          cd "$PAGES"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          git commit -m "appcast: ${{ steps.ver.outputs.tag }}" || { echo "No appcast change."; exit 0; }
          git push origin gh-pages
