name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build, sign, notarize, publish
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version from tag
        id: ver
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Show toolchain
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build unsigned Release app
        run: ./scripts/build-release-app.sh "${{ steps.ver.outputs.version }}" "$GITHUB_RUN_NUMBER"

      - name: Verify universal binary
        run: lipo -info build/Build/Products/Release/Sonance.app/Contents/MacOS/Sonance

      - name: Import Developer ID certificate
        env:
          P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.MACOS_CERT_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          echo "$P12_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          rm "$CERT_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Codesign with Developer ID
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | awk -F '"' '/Developer ID Application/ {print $2; exit}')
          if [[ -z "$IDENTITY" ]]; then
            echo "No Developer ID Application identity in $KEYCHAIN_PATH"
            security find-identity -v -p codesigning "$KEYCHAIN_PATH"
            exit 1
          fi
          ./scripts/sign-app.sh \
            build/Build/Products/Release/Sonance.app \
            "$IDENTITY" \
            "$KEYCHAIN_PATH"

      - name: Notarize app
        env:
          KEY_BASE64: ${{ secrets.MACOS_NOTARY_API_KEY_P8_BASE64 }}
          KEY_ID: ${{ secrets.MACOS_NOTARY_API_KEY_ID }}
          ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
        run: |
          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          NOTARY_ZIP="$RUNNER_TEMP/Sonance-notarize.zip"
          echo "$KEY_BASE64" | base64 --decode > "$KEY_PATH"
          ditto -c -k --keepParent build/Build/Products/Release/Sonance.app "$NOTARY_ZIP"
          xcrun notarytool submit "$NOTARY_ZIP" \
            --key "$KEY_PATH" \
            --key-id "$KEY_ID" \
            --issuer "$ISSUER_ID" \
            --wait
          rm "$KEY_PATH"

      - name: Staple notarization ticket
        run: |
          xcrun stapler staple build/Build/Products/Release/Sonance.app
          xcrun stapler validate build/Build/Products/Release/Sonance.app
          spctl -a -vv build/Build/Products/Release/Sonance.app

      - name: Create release artifacts
        run: |
          mkdir -p build/release
          ditto -c -k --keepParent \
            build/Build/Products/Release/Sonance.app \
            "build/release/Sonance-${{ steps.ver.outputs.tag }}.zip"
          ./scripts/make-dmg.sh \
            build/Build/Products/Release/Sonance.app \
            "build/release/Sonance-${{ steps.ver.outputs.tag }}.dmg"
          ls -lh build/release

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/build.keychain-db" || true

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NOTES="$RUNNER_TEMP/release-notes.md"
          {
            echo "## Install"
            echo
            echo 'Download `Sonance-${{ steps.ver.outputs.tag }}.dmg`, open it, and drag Sonance.app to Applications.'
            echo
            echo "The app is signed with Apple Developer ID and notarized by Apple, so Gatekeeper should allow a normal launch."
            echo
            echo "Requires macOS 14+."
          } > "$NOTES"

          gh release create "${{ steps.ver.outputs.tag }}" \
            "build/release/Sonance-${{ steps.ver.outputs.tag }}.zip" \
            "build/release/Sonance-${{ steps.ver.outputs.tag }}.dmg" \
            --title "Sonance ${{ steps.ver.outputs.tag }}" \
            --generate-notes \
            --notes-file "$NOTES"
