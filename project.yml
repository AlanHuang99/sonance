name: Sonance
options:
  bundleIdPrefix: com.alanhuang
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
targets:
  Sonance:
    type: application
    platform: macOS
    sources:
      - path: Sonance
    info:
      path: Sonance/Info.plist
      properties:
        CFBundleName: Sonance
        CFBundleDisplayName: Sonance
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSApplicationCategoryType: public.app-category.music
        LSMinimumSystemVersion: "14.0"
        NSHumanReadableCopyright: ""
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSLocalNetworkUsageDescription: Sonance needs local network access to connect to your Navidrome/Subsonic server on your LAN.
        NSBonjourServices:
          - _http._tcp
          - _https._tcp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.alanhuang.Sonance
        PRODUCT_NAME: Sonance
        SWIFT_VERSION: "5.9"
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: Sonance/Sonance.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
  SonanceTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: SonanceTests
    dependencies:
      - target: Sonance
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.alanhuang.SonanceTests
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
